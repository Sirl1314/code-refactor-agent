agent:
  max_retries: 3
  temperature: 0.3
  model_reviewer: deepseek-reasoner
  model_refactor: deepseek-chat
  model_test: deepseek-chat
  
review:
  max_complexity: 10
  max_function_lines: 50
  max_file_lines: 500
  
refactor:
  auto_apply: false
  create_pr: true
  
test:
  coverage_target: 80
  test_framework: pytest